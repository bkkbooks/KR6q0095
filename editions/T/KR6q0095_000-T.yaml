front:
  text: 真心直說序或曰祖師妙道可得知乎曰古不云乎道不屬知不屬不知知是妄想不知是無記若真達不疑之地猶如太虛寬廓豈可強是非耶或曰然則諸祖出世無益群生耶曰佛祖出頭無法與人只要眾生自見本性華嚴云知一切法即心自性成就慧身不由他悟是故佛祖不令人泥著文字只要休歇見自本心所以德山入門便棒臨濟入門便喝已是探頭太過何更立語言哉或曰昔聞馬鳴造起信六祖演壇經黃梅傳般若皆是漸次為人豈獨無方便於法可乎曰妙高頂上從來不許商量第二峯頭諸祖略容話會或曰敢祈第二峯頭略垂方便耶曰然哉是言也奈何大道玄曠非有非無真心幽微絕思絕議故不得其門而入者雖檢五千之藏教不以為多洞曉真心者但出一言之擬比早是剩法矣今不惜眉毛謹書數章發明真心以為入道之基漸也是為序重刻真心直說序夫真心直說者佛佛授手祖祖相傳更無別法也心者人人之本源諸佛之覺性一切萬法盡在一心之內八萬四千法門從此而出悟此心者凡聖交參迷此心者生死無際心隨事轉事隨理彰事理融和名直說者矣今比丘淨林宿生慶幸得遇斯文發心重新刊梓流通命予為序以冠篇首予才陋語拙學問之淺無足以發明其深奧略序直說真心以塞其請耳旹成化己丑年五月端陽日後學文定序
